# Render blueprint for Infinity Markets.
#
# Assumed repo layout at root:
#   client/   React + Vite frontend
#   server/   Express API + deliverables renderers
#   ops/      Post-deploy operational runners (not used by Render build)
#   render.yaml, package.json, .nvmrc, .gitignore, README.md, DEPLOY_NOTES.md
#
# Blueprint docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: infinity-markets
    runtime: node
    plan: starter
    region: ohio
    branch: main

    # Build:
    #   1. cd into client, install (handle missing lockfile gracefully), vite build
    #   2. cd into server, install (handle missing lockfile gracefully)
    # Static assets land in client/dist and are served by the Express app.
    buildCommand: |
      set -e
      echo "=== Building client ==="
      cd client
      if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
      npm run build
      echo "=== Building server ==="
      cd ../server
      if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
      echo "=== Build complete ==="

    startCommand: cd server && NODE_ENV=production node index.js

    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: